<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>MarketPalm - Login Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

<div class="card shadow-sm border-0" style="width: 100%; max-width: 400px;">
    <div class="card-body p-4">

        <div class="text-center mb-4">
            <h4 class="fw-bold text-success">MarketPalm 🌴</h4>
            <p class="text-muted small">Painel Administrativo</p>
        </div>

        <!-- Mensagem de erro de login -->
        <div th:if="${param.error}" class="alert alert-danger py-2 small">
            Usuário ou senha incorretos.
        </div>

        <!-- Mensagem de logout bem-sucedido -->
        <div th:if="${param.logout}" class="alert alert-success py-2 small">
            Sessão encerrada com sucesso.
        </div>

        <form th:action="@{/admin/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Usuário</label>
                <input type="text" id="username" name="username"
                       class="form-control" placeholder="admin" required autofocus>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Senha</label>
                <input type="password" id="password" name="password"
                       class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Entrar</button>
        </form>

    </div>
</div>

</body>
</html>
