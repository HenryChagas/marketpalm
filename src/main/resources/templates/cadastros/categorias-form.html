<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>MarketPalm - Categoria</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <th:block th:replace="~{fragments/styles :: estilos}"></th:block>
</head>
<body class="bg-light">
<div th:replace="~{fragments/sidebar :: sidebar('cadastros')}"></div>
<header th:replace="~{fragments/topbar :: topbar(__${titulo}__)}"></header>

<main class="main">
  <div class="d-flex align-items-center gap-2 mb-4">
    <a th:href="@{/admin/cadastros/categorias}" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left"></i>
    </a>
    <h4 class="fw-bold mb-0" th:text="${titulo}">Categoria</h4>
  </div>

  <div class="section-card" style="max-width: 420px;">

    <div th:if="${erro}" class="alert alert-danger py-2 small">
      <i class="bi bi-exclamation-circle me-1"></i>
      <span th:text="${erro}"></span>
    </div>

    <!-- Novo -->
    <form th:if="${categoria.id == null}"
          th:action="@{/admin/cadastros/categorias/salvar}"
          method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Nome da categoria <span class="text-danger">*</span></label>
        <input type="text" name="name" th:value="${categoria.name}"
               class="form-control" required placeholder="Ex: Bebidas">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary px-4">
          <i class="bi bi-check-lg me-1"></i>Salvar
        </button>
        <a th:href="@{/admin/cadastros/categorias}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>

    <!-- Editar -->
    <form th:if="${categoria.id != null}"
          th:action="@{/admin/cadastros/categorias/{id}/atualizar(id=${categoria.id})}"
          method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Nome da categoria <span class="text-danger">*</span></label>
        <input type="text" name="name" th:value="${categoria.name}"
               class="form-control" required placeholder="Ex: Bebidas">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary px-4">
          <i class="bi bi-check-lg me-1"></i>Salvar alterações
        </button>
        <a th:href="@{/admin/cadastros/categorias}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
