<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>MarketPalm - Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <th:block th:replace="~{fragments/styles :: estilos}"></th:block>
</head>
<body class="bg-light">
<div th:replace="~{fragments/sidebar :: sidebar('cadastros')}"></div>
<header th:replace="~{fragments/topbar :: topbar(__${titulo}__)}"></header>

<main class="main">
    <div class="d-flex align-items-center gap-2 mb-4">
        <a th:href="@{/admin/cadastros/produtos}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h4 class="fw-bold mb-0" th:text="${titulo}">Produto</h4>
    </div>

    <div class="section-card" style="max-width: 680px;">

        <!-- Erro -->
        <div th:if="${erro}" class="alert alert-danger py-2 small">
            <i class="bi bi-exclamation-circle me-1"></i>
            <span th:text="${erro}"></span>
        </div>

        <!-- Formulário novo produto -->
        <form th:if="${produto.id == null}"
              th:action="@{/admin/cadastros/produtos/salvar}"
              method="post" enctype="multipart/form-data">

            <th:block th:replace="~{cadastros/produto-form :: campos(${produto}, ${categorias})}"></th:block>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-check-lg me-1"></i>Salvar
                </button>
                <a th:href="@{/admin/cadastros/produtos}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>

        <!-- Formulário edição -->
        <form th:if="${produto.id != null}"
              th:action="@{/admin/cadastros/produtos/{id}/atualizar(id=${produto.id})}"
              method="post" enctype="multipart/form-data">

            <th:block th:replace="~{cadastros/produto-form :: campos(${produto}, ${categorias})}"></th:block>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-check-lg me-1"></i>Salvar alterações
                </button>
                <a th:href="@{/admin/cadastros/produtos}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</main>

<!-- Fragment com os campos reutilizáveis -->
<th:block th:fragment="campos(produto, categorias)">
    <div class="row g-3">
        <div class="col-md-8">
            <label class="form-label fw-semibold">Nome do produto <span class="text-danger">*</span></label>
            <input type="text" name="name" th:value="${produto.name}"
                   class="form-control" required placeholder="Ex: Coca-Cola 350ml">
        </div>
        <div class="col-md-4">
            <label class="form-label fw-semibold">Código de barras <span class="text-danger">*</span></label>
            <input type="text" name="barcode" th:value="${produto.barcode}"
                   class="form-control" required placeholder="Ex: 7891234567890">
        </div>
        <div class="col-md-4">
            <label class="form-label fw-semibold">Preço (R$) <span class="text-danger">*</span></label>
            <input type="number" name="price" th:value="${produto.price}"
                   class="form-control" required step="0.01" min="0.01" placeholder="0,00">
        </div>
        <div class="col-md-4">
            <label class="form-label fw-semibold">Estoque <span class="text-danger">*</span></label>
            <input type="number" name="stock" th:value="${produto.stock}"
                   class="form-control" required min="0" placeholder="0">
        </div>
        <div class="col-md-4">
            <label class="form-label fw-semibold">Categoria</label>
            <select name="category.id" class="form-select">
                <option value="">— Sem categoria —</option>
                <option th:each="cat : ${categorias}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${produto.category != null && produto.category.id == cat.id}">
                </option>
            </select>
        </div>
        <div class="col-12">
            <label class="form-label fw-semibold">Imagem do produto</label>
            <input type="file" name="imagem" class="form-control" accept="image/*"
                   onchange="previewImagem(this)">
            <!-- Preview da imagem atual ou nova -->
            <div class="mt-2">
                <img id="preview"
                     th:if="${produto.imagemUrl != null}"
                     th:src="${produto.imagemUrl}"
                     alt="Preview"
                     style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid #dee2e6;">
                <img id="preview"
                     th:unless="${produto.imagemUrl != null}"
                     src="#" alt="Preview"
                     style="display:none;width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid #dee2e6;">
            </div>
        </div>
    </div>
</th:block>

<script>
    function previewImagem(input) {
        const preview = document.getElementById('preview');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                preview.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
