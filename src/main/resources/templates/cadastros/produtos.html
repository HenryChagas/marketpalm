<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>MarketPalm - Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <th:block th:replace="~{fragments/styles :: estilos}"></th:block>
</head>
<body class="bg-light">
<div th:replace="~{fragments/sidebar :: sidebar('cadastros')}"></div>

<header th:replace="~{fragments/topbar :: topbar('Cadastro de Produtos')}"></header>

<main class="main">

    <!-- Alertas -->
    <div th:if="${param.sucesso}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i>Operação realizada com sucesso!
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Cabeçalho da página -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-0">Produtos</h4>
            <span class="text-muted small">Gerencie o catálogo de produtos</span>
        </div>
        <a th:href="@{/admin/cadastros/produtos/novo}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Novo Produto
        </a>
    </div>

    <!-- Busca -->
    <div class="section-card mb-4">
        <form th:action="@{/admin/cadastros/produtos}" method="get" class="d-flex gap-2">
            <input type="text" name="busca" th:value="${busca}"
                   class="form-control" placeholder="Buscar por nome...">
            <button type="submit" class="btn btn-outline-primary px-4">
                <i class="bi bi-search"></i>
            </button>
            <a th:href="@{/admin/cadastros/produtos}" class="btn btn-outline-secondary">Limpar</a>
        </form>
    </div>

    <!-- Tabela -->
    <div class="section-card">
        <div class="table-responsive">
            <table class="table ranking-table mb-0">
                <thead>
                <tr>
                    <th>Imagem</th>
                    <th>Nome</th>
                    <th>Cód. Barras</th>
                    <th>Categoria</th>
                    <th class="text-center">Estoque</th>
                    <th class="text-end">Preço</th>
                    <th class="text-center">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="produto : ${produtos}">
                    <td>
                        <img th:if="${produto.imagemUrl != null}"
                             th:src="${produto.imagemUrl}"
                             alt="Imagem" style="width:40px;height:40px;object-fit:cover;border-radius:6px;">
                        <span th:unless="${produto.imagemUrl != null}"
                              class="text-muted small">—</span>
                    </td>
                    <td class="fw-semibold" th:text="${produto.name}">Nome</td>
                    <td class="text-muted small" th:text="${produto.barcode}">000</td>
                    <td>
                        <span th:if="${produto.category != null}"
                              class="badge bg-primary bg-opacity-10 text-primary"
                              th:text="${produto.category.name}">Cat</span>
                        <span th:unless="${produto.category != null}" class="text-muted small">—</span>
                    </td>
                    <td class="text-center">
                        <span th:classappend="${produto.stock <= 5} ? 'text-danger fw-bold' : 'text-success'"
                              th:text="${produto.stock}">0</span>
                    </td>
                    <td class="text-end fw-semibold"
                        th:text="'R$ ' + ${#numbers.formatDecimal(produto.price, 1, 'POINT', 2, 'COMMA')}">R$ 0,00</td>
                    <td class="text-center">
                        <a th:href="@{/admin/cadastros/produtos/{id}/editar(id=${produto.id})}"
                           class="btn btn-sm btn-outline-secondary me-1">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/admin/cadastros/produtos/{id}/excluir(id=${produto.id})}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('Excluir este produto?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(produtos)}">
                    <td colspan="7" class="text-center text-muted py-4">Nenhum produto encontrado.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
